<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A0A35"/>
      <stop offset="50%" style="stop-color:#3D0D5C"/>
      <stop offset="100%" style="stop-color:#07080F"/>
    </linearGradient>
    <linearGradient id="trophy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5A623"/>
      <stop offset="100%" style="stop-color:#E8920F"/>
    </linearGradient>
  </defs>
  <!-- Fond arrondi -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Bordure violette subtile -->
  <rect width="64" height="64" rx="14" fill="none" stroke="rgba(91,29,176,0.6)" stroke-width="1.5"/>
  <!-- Trophée simplifié -->
  <path d="M32 10 C24 10 20 16 20 22 C20 28 24 32 30 33 L30 38 L26 40 L26 44 L38 44 L38 40 L34 38 L34 33 C40 32 44 28 44 22 C44 16 40 10 32 10 Z" fill="url(#trophy)"/>
