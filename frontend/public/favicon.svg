  <path d="M20 16 C16 16 14 19 14 22 C14 25 16 27 20 27" fill="none" stroke="url(#trophy)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M44 16 C48 16 50 19 50 22 C50 25 48 27 44 27" fill="none" stroke="url(#trophy)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Base -->
  <rect x="22" y="44" width="20" height="3" rx="1.5" fill="url(#trophy)"/>
  <rect x="19" y="47" width="26" height="3" rx="1.5" fill="url(#trophy)" opacity="0.8"/>
  <!-- Étoile DLS -->
  <circle cx="32" cy="22" r="5" fill="rgba(255,255,255,0.15)"/>
  <text x="32" y="26" text-anchor="middle" font-size="7" fill="white" font-family="Arial" font-weight="bold">26</text>
</svg>
